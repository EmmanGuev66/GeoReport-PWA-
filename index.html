<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoReport</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="connectionStatus" class="offline">
  🔴 Sin conexión
  </div>

<header>
  <h1>GeoReport</h1>
</header>


<main id="report-list">
  </main>

<button id="fab" aria-label="Nuevo Reporte">+</button>

<div id="modal" class="hidden">
  <div class="modal-content">
    <input type="text" id="title" placeholder="Título">
    <textarea id="description" placeholder="Descripción"></textarea>

    <button id="startCamera">Abrir cámara</button>
    
    <div id="photoContainer" style="text-align: center;">
        <img id="preview" width="120">
        <button id="deletePhotoBtn" class="hidden">Eliminar foto</button>
    </div>

    <canvas id="canvas" class="hidden"></canvas>
    <input type="file" id="photo" accept="image/*">

    <button id="getLocation">Ubicación</button>
    <p id="locationText">Sin ubicación</p>

    <button id="saveReport">Guardar</button>
    <button id="closeModal">Cancelar</button>
  </div>
</div>

<div id="cameraContainer" class="hidden">
  <video id="camera" autoplay playsinline></video>
  <button id="takePhoto">Tomar foto</button>
  <button id="closeCamera">Cancelar</button>
</div>

<script src="db/indexedDB.js"></script>
<script src="app.js"></script>

</body>
</html>
